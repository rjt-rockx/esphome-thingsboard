# Compile-test config for the MQTT transport with X.509 mTLS.
# Exercises the TLS codegen/cert-wiring path; not intended to run against a real broker.
# PEMs below are dummy self-signed material; never reuse for production.

esphome:
  name: tb-mqtt-tls-test

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../components
    components:
      - thingsboard
      - thingsboard_mqtt
      - thingsboard_mqtt_ota

logger:

wifi:
  ssid: "test"
  password: "testtesttest"

http_request:
  id: tb_http
  timeout: 10s

thingsboard:
  id: thingsboard_component
  server_url: "https://demo.thingsboard.io"

thingsboard_mqtt:
  thingsboard_id: thingsboard_component
  broker: "demo.thingsboard.io"
