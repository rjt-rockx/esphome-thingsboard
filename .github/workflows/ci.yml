name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    name: Compile (${{ matrix.transport }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        transport: [mqtt, mqtt.tls, http]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ESPHome
        run: pip install -r requirements.txt

      - name: Compile test firmware
        run: esphome compile tests/test.${{ matrix.transport }}.yaml
